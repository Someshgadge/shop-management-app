name: shop_management_app
description: Shop Management Application with real-time sync for Android and Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase - Older compatible version
  supabase_flutter: ^1.10.0
  
  # State Management
  provider: ^6.0.5
  
  # UI Components
  cupertino_icons: ^1.0.5
  google_fonts: ^5.1.0
  fluttertoast: ^8.2.2
  intl: ^0.18.0
  fl_chart: ^0.64.0
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Utilities
  uuid: ^4.0.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
